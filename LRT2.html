<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Project</title>

    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        body{
            font-family: 'Jost', sans-serif;
            margin: 0;
            background: #f2f2f2;
            height: 1000px;
        }
        .hero-section{
            background-image: url("hero.png");
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            padding: 30px 90px;
            min-height: 150px;
            overflow: visible;
            position: relative;
        }
        .hero h1, .hero h2{
            font-weight: 200;
            margin: 0;
        }
        .logo{
            width: 350px;
            height: 350px;
            object-fit: contain;
            position: relative;
            right: 0;
        }
        .navbar{
            width: 100%;
            height: 80px;
            background-color: #1b5f83;
            color:  white;
            position: sticky;
            top: 20px;
            margin: 0;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: 'Jost';
            padding: 0 40px;
            box-sizing: border-box;
            overflow: hidden;
            border-radius: 0;
            z-index: 2;
        }
        .btn-group{
            position: relative;
            display: flex;
            gap: 25px;
        }
        .btn{
            padding: 10px 18px;
            font-size: 14px;
            color: white;
            background-color: transparent;
            font-family: 'Jost';
            border: none;
            cursor: pointer;
            border-radius: 20px;
            transition: 0.3s;
        }
        .btn:hover{
            color: #1b5f83 ;
            background-color: white;
        }
        .line {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 10px;
            width: 90%;
            margin: auto;
        }

        .station {
            border: 2px solid #333;
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            user-select: none;
            position: relative;
            text-align: center;

            flex-shrink: 0;
        }

        .line::-webkit-scrollbar{
            height: 6px;
        }

        .line::-webkit-scrollbar-thumb{
            background: #1b5f83;
            border-radius: 10px;
        }

        .station:hover::after {
            content: attr(data-name);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: black;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            font-size: 12px;
        }

        .station.Origin {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }

        .station.Destination {
        background-color: #FF5722;
        color: white;
        border-color: #FF5722;
        }

        .station.Between {
        background-color: #FFC107;
        color: white;
        border-color: #FFC107;
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="hero-section">
            <div>
            <h1 style="letter-spacing: 6px; font-size: 80px; color: #1b5f83;">LINK LUZON,</h1>
            <h2 style="letter-spacing: 4px; font-size: 50px;">RIDE THE FUTURE</h2>
            </div>

            <img src="logo.png" alt="LuzonLink Rail Logo" class="logo">
        </div>

    </header>

<div class="navbar"  style="position: sticky;">
    <p style="font-size: 26px; font-weight: 300;">LUZONLINK RAIL</p>

    <div class="btn-group">
        <a href="booking.html"><button class="btn">HOME</button></a>
        <a href="account.html"><button class="btn">ACCOUNT</button></a>
        <a href="LRT2.html" style="color: #1b5f83; background-color: white;" ><button class="btn" style="color: #1b5f83;">LRT line 2</button></a>
    </div>
</div>

<div style="width: 50%; border-left: 5px solid blue; height: auto; padding: 20px ; margin-left: 50px ; margin: 40px;">
    <h2 style="color: blue; font-size: 50px;">LRT Line 2 (Recto-Antipolo)</h2>
</div>


<div id="station-group" class="line">
    <div class="station">Recto</div>
    <div class="station">Legarda</div>
    <div class="station">Pureza</div>
    <div class="station">V. Mapa</div>
    <div class="station">J. Ruiz</div>
    <div class="station">Gilmore</div>
    <div class="station">Betty Go-Belmonte</div>
    <div class="station">Araneta Center-Cubao</div>
    <div class="station">Anonas</div>
    <div class="station">Katipunan</div>
    <div class="station">Santolan</div>
    <div class="station">Marikina-Pasig</div>
    <div class="station">Antipolo</div>


</div>

<div>
    <div style="width: 50%; height: auto; padding: 20px ; margin-left: 50px ; margin: 40px; color: blue;">
        <h2 id="od" style="border-left: 5px solid blue;"></h2>
    </div>
    <div style="width: 50%; height: auto; padding: 20px ; margin-left: 50px ; margin: 40px; color: blue;">
        <p id="result" style="border-left: 5px solid blue; "></p>
    </div>
    <div style="width: 50%;height: auto; padding: 20px ; margin-left: 50px ; margin: 40px; color: blue;">
        <p id="dis" style="border-left: 5px solid blue; "></p>
    </div>
    <div style="width: 50%; height: auto; padding: 20px ; margin-left: 50px ; margin: 40px; color: blue;">
        <p id="dprice" style="border-left: 5px solid blue;"></p>
    </div>
</div>

<div style="overflow: visible; width: 100%; margin: 0px; background-color: #1b5f83c3; height: 250px; margin-top: 100px;">
    <div style="color: white; margin-left: 100px ; position: relative; top: 40px;">
        <h3>Creators</h3>
        <p>Alysha, Aguilar</p>
        <p>Nataliya, Pabale</p>
        <p>Jake, Naguit</p>
    </div>
    <div style="display: flex; justify-content: center; width: 100%;">
        <img src="logo.png" width="150px" height="auto" style=" position: relative; bottom: 250px; " >
    </div>
    <div style="color: white; float: right; margin-right: 100px; position: relative; bottom: 150px;">
        <p>© 2026 www.LuzonLinkRail.com</p>
    </div>

</div>

<script>



    const stations = [
        {name: "Recto", km: 0.0 },
        {name: "Legarda", km: 1.1 },
        {name: "Pureza", km: 2.0 },
        {name: "V. Mapa", km: 3.0 },
        {name: "J. Ruiz", km: 4.0 },
        {name: "Gilmore", km: 5.0 },
        {name: "Betty Go-Belmonte", km: 6.0 },
        {name: "Araneta Center-Cubao", km: 7.0 },
        {name: "Anonas", km: 8.0 },
        {name: "Katipunan", km: 9.0 },
        {name: "Santolan", km: 10.5 },
        {name: "Marikina-Pasig", km: 12.0 },
        {name: "Antipolo", km: 26 },
    ];

    let origin = null;
    let dest = null;

    const stationDivs = document.querySelectorAll("#station-group .station");


    stationDivs.forEach((div, index) => {
        div.dataset.name = stations[index].name;
        div.dataset.km = stations[index].km;
        div.dataset.index = index;

        div.addEventListener("click", () => handleClick(index, div));
        
    });

    function handleClick(index, div){
        if (origin === null){
            origin = index;
            div.classList.add("Origin")
        } else if (dest === null && index !== origin){
            dest = index;
            div.classList.add("Destination");

            const start = Math.min(origin, dest);
            const end = Math.max(origin, dest);
            stationDivs.forEach((s, i) => {
                if (i > start && i < end) s.classList.add("Between")
            })

            calculateFare();
        } else {
            resetSelection();
            origin = index
            div.classList.add("Origin")
        }

        
    }

    function calculateFare(){
        if (origin === null || dest === null) return;

        const distance = Math.abs(
            stations[dest].km - stations[origin].km
        );

        const basefare = 15;
        const perkm = 6;
        const fare = Math.round(basefare + distance * perkm);

        const age = Number(localStorage.getItem("age"));
        let discount = 0;

        const dis = document.getElementById("dis");

        if (age >= 60){
            discount = 0.20;
            if(dis) dis.innerHTML = "DISCOUNT : 20%";
        }
        else if (age < 18){
            discount = 0.05;
            if(dis) dis.innerHTML = "DISCOUNT : 5%";
        }
        else{
            if(dis) dis.innerHTML = "DISCOUNT : 0";
        } 

        const Dfare = Math.round(fare * (1 - discount));
        document.getElementById("result").innerText = "Distance:" + distance.toFixed(2) + "km" + "|" + "Fare: P" + fare.toFixed(2);
        
        if (discount >= 0.05){
            document.getElementById("dprice").innerText = "Discounted Fare: P" + Dfare.toFixed(2);
        } else{
            document.getElementById("dprice").innerText = "Discounted Fare: NONE";
        }

        const originName = stations[origin].name;
        const destName = stations[dest].name;

        document.getElementById("od").innerText =
            "From: " + originName + " → To: " + destName;
 
    }

    

    function resetSelection(){
        origin = null;
        dest = null;
        stationDivs.forEach(s => s.classList.remove("Origin", "Destination", "Between"));
        document.getElementById("result").innerText = "Select Two Stations"
    }
    

</script>

</body>
</html>
